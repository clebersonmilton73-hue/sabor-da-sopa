
<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sabor da Sopa - Admin</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#e5eefc}
.layout{display:flex;min-height:100vh}
.sidebar{
width:240px;background:#020617;border-right:1px solid rgba(148,163,184,.15);
padding:20px;box-sizing:border-box
}
.sidebar h2{margin:0 0 20px;font-size:18px}
.menu button{
width:100%;padding:12px;margin-bottom:8px;border:none;border-radius:10px;
background:#111827;color:#cbd5f5;font-weight:700;cursor:pointer;text-align:left
}
.menu button:hover{background:#1f2937}
.content{flex:1;padding:20px}
.section{display:none}
.section.active{display:block}
.card{
background:#111827;border:1px solid rgba(148,163,184,.15);
border-radius:12px;padding:16px;margin-bottom:16px
}
</style>

<script>
function openView(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
 document.getElementById(id).classList.add('active')
}
</script>

</head>

<body>

<div class="layout">

<div class="sidebar">
<h2>🍲 Sabor da Sopa</h2>

<div class="menu">
<button onclick="openView('dashboard')">📊 Dashboard</button>
<button onclick="openView('pedidos')">🛵 Pedidos Online</button>
<button onclick="openView('pdv')">💰 Venda Presencial</button>
<button onclick="openView('produtos')">🍲 Produtos</button>
<button onclick="openView('clientes')">👥 Clientes</button>
<button onclick="openView('config')">⚙ Configuração</button>
</div>
</div>

<div class="content">

<div id="dashboard" class="section active">
<div class="card"><b>Dashboard</b><br>Resumo das vendas aparecerá aqui.</div>
</div>

<div id="pedidos" class="section">
<div class="card"><b>Pedidos Online</b><br>Aqui aparecem os pedidos feitos pelo cardápio.</div>
</div>

<div id="pdv" class="section">
<div class="card"><b>PDV - Venda Presencial</b><br>Tela de caixa para vender direto no balcão.</div>
</div>

<div id="produtos" class="section">
<div class="card"><b>Produtos</b><br>Cadastrar e editar sopas.</div>
</div>

<div id="clientes" class="section">
<div class="card"><b>Clientes</b><br>Lista automática de clientes.</div>
</div>

<div id="config" class="section">
<div class="card"><b>Configuração</b><br>Dados da empresa.</div>
</div>

</div>
</div>

</body>
</html>
