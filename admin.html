
<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sabor da Sopa - Admin PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#e5eefc}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:#020617;border-right:1px solid rgba(148,163,184,.15);padding:20px}
.sidebar h2{margin:0 0 20px}
.menu button{width:100%;padding:12px;margin-bottom:8px;border:none;border-radius:10px;background:#111827;color:#cbd5f5;font-weight:700;cursor:pointer;text-align:left}
.menu button:hover{background:#1f2937}
.content{flex:1;padding:20px}
.section{display:none}
.section.active{display:block}
.card{background:#111827;border:1px solid rgba(148,163,184,.15);border-radius:12px;padding:16px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.prod{background:#1f2937;padding:12px;border-radius:10px}
button.primary{background:#3b82f6;color:white;border:none;padding:10px 14px;border-radius:8px;font-weight:bold;cursor:pointer}
button.good{background:#22c55e;color:white;border:none;padding:6px 10px;border-radius:6px;margin-right:5px;cursor:pointer}
button.warn{background:#f59e0b;color:black;border:none;padding:6px 10px;border-radius:6px;margin-right:5px;cursor:pointer}
button.bad{background:#ef4444;color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer}
</style>

<script>
function openView(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
 document.getElementById(id).classList.add('active')
}
</script>

</head>

<body>

<div class="layout">

<div class="sidebar">
<h2>🍲 Sabor da Sopa</h2>

<div class="menu">
<button onclick="openView('dashboard')">📊 Dashboard</button>
<button onclick="openView('pedidos')">🛵 Pedidos Online</button>
<button onclick="openView('pdv')">💰 Venda Presencial</button>
<button onclick="openView('produtos')">🍲 Cardápio</button>
<button onclick="openView('clientes')">👥 Clientes</button>
</div>
</div>

<div class="content">

<div id="dashboard" class="section active">
<div class="card">
<b>Dashboard</b><br>
<span id="infoPedidos"></span>
</div>
</div>

<div id="pedidos" class="section">
<div class="card">
<b>Pedidos Online</b>
<div id="listaPedidos">Carregando...</div>
</div>
</div>

<div id="pdv" class="section">
<div class="card">
<b>PDV</b>
<div id="pdvProdutos" class="grid"></div>

<h3>Carrinho</h3>
<div id="pdvCart"></div>
<b>Total: R$ <span id="pdvTotal">0</span></b><br><br>
<button class="primary" onclick="finalizarVenda()">Finalizar Venda</button>
</div>
</div>

<div id="produtos" class="section">
<div class="card">
<b>Adicionar Produto</b><br><br>
<input id="nome" placeholder="Nome da sopa"><br>
<input id="preco" placeholder="Preço"><br>
<input id="categoria" placeholder="Categoria"><br><br>
<button class="primary" onclick="addProduto()">Salvar</button>
</div>

<div class="card">
<b>Produtos</b>
<div id="listaProdutos"></div>
</div>
</div>

<div id="clientes" class="section">
<div class="card">
<b>Clientes</b>
<div id="listaClientes"></div>
</div>
</div>

</div>
</div>

<audio id="somPedido">
<source src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg">
</audio>

<script type="module">

import { firebaseConfig } from "./firebase-config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let produtos=[]
let cart=[]
let pedidosCache=0

async function carregarProdutos(){
 const snap = await getDocs(collection(db,'produtos'))
 produtos = snap.docs.map(d=>({id:d.id,...d.data()}))
 renderProdutos()
 renderPDV()
}

function renderProdutos(){
 const el=document.getElementById("listaProdutos")
 el.innerHTML=produtos.map(p=>`
 <div class="prod">
 <b>${p.nome}</b><br>
 R$ ${p.preco}<br>
 <button onclick="removerProduto('${p.id}')">Excluir</button>
 </div>
 `).join("")
}

function renderPDV(){
 const el=document.getElementById("pdvProdutos")
 el.innerHTML=produtos.map(p=>`
 <div class="prod" onclick="addPDV('${p.id}')">
 ${p.nome}<br>
 R$ ${p.preco}
 </div>
 `).join("")
}

window.addPDV=function(id){
 const p=produtos.find(x=>x.id==id)
 cart.push(p)
 renderCart()
}

function renderCart(){
 const el=document.getElementById("pdvCart")
 let total=0
 el.innerHTML=cart.map(i=>{
 total+=Number(i.preco)
 return `<div>${i.nome} - R$ ${i.preco}</div>`
 }).join("")
 document.getElementById("pdvTotal").innerText=total
}

window.finalizarVenda=function(){
 if(!cart.length) return alert("Carrinho vazio")
 alert("Venda realizada")
 cart=[]
 renderCart()
}

window.addProduto=async function(){
 const nome=document.getElementById("nome").value
 const preco=document.getElementById("preco").value
 const categoria=document.getElementById("categoria").value

 await addDoc(collection(db,'produtos'),{
  nome,
  preco:Number(preco),
  cat:categoria,
  ativo:true
 })

 alert("Produto salvo")
 carregarProdutos()
}

window.removerProduto=async function(id){
 await deleteDoc(doc(db,'produtos',id))
 carregarProdutos()
}

async function carregarPedidos(){

 const snap = await getDocs(collection(db,'pedidos'))
 const pedidos = snap.docs.map(d=>({id:d.id,...d.data()}))

 if(pedidos.length>pedidosCache){
   document.getElementById("somPedido").play()
 }

 pedidosCache=pedidos.length

 document.getElementById("infoPedidos").innerText="Pedidos hoje: "+pedidos.length

 document.getElementById("listaPedidos").innerHTML = pedidos.map(p=>`
 <div class="prod">
 <b>${p.cliente?.nome}</b><br>
 Total: R$ ${p.total}<br><br>

 <button class="good" onclick="zap('${p.cliente?.tel}')">WhatsApp</button>
 <button class="warn">Preparando</button>
 <button class="primary">Saiu</button>
 <button class="bad">Entregue</button>

 </div>
 `).join("")

}

window.zap=function(tel){
 window.open("https://wa.me/55"+tel,"_blank")
}

carregarProdutos()
carregarPedidos()
setInterval(carregarPedidos,5000)

</script>

</body>
</html>
