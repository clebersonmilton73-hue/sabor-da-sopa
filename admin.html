
<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sabor da Sopa - Admin PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#e5eefc}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:#020617;border-right:1px solid rgba(148,163,184,.15);padding:20px}
.sidebar h2{margin:0 0 20px}
.menu button{width:100%;padding:12px;margin-bottom:8px;border:none;border-radius:10px;background:#111827;color:#cbd5f5;font-weight:700;cursor:pointer;text-align:left}
.menu button:hover{background:#1f2937}
.content{flex:1;padding:20px}
.section{display:none}
.section.active{display:block}
.card{background:#111827;border:1px solid rgba(148,163,184,.15);border-radius:12px;padding:16px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.prod{background:#1f2937;padding:12px;border-radius:10px;cursor:pointer}
button.primary{background:#3b82f6;color:white;border:none;padding:10px 14px;border-radius:8px;font-weight:bold;cursor:pointer}
button.good{background:#22c55e;color:white;border:none;padding:6px 10px;border-radius:6px;margin-right:5px}
button.warn{background:#f59e0b;color:black;border:none;padding:6px 10px;border-radius:6px;margin-right:5px}
button.bad{background:#ef4444;color:white;border:none;padding:6px 10px;border-radius:6px}
.cart{margin-top:15px}
</style>

<script>
function openView(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
 document.getElementById(id).classList.add('active')
}
</script>
</head>

<body>

<div class="layout">

<div class="sidebar">
<h2>🍲 Sabor da Sopa</h2>

<div class="menu">
<button onclick="openView('dashboard')">📊 Dashboard</button>
<button onclick="openView('pedidos')">🛵 Pedidos Online</button>
<button onclick="openView('pdv')">💰 Venda Presencial</button>
<button onclick="openView('cardapio')">🍲 Cardápio</button>
<button onclick="openView('clientes')">👥 Clientes</button>
</div>
</div>

<div class="content">

<div id="dashboard" class="section active">
<div class="card">
<b>Dashboard</b><br>
Pedidos online em tempo real aparecerão automaticamente.
</div>
</div>

<div id="pedidos" class="section">
<div class="card">
<b>Pedidos Online</b>
<div id="listaPedidos">Carregando pedidos...</div>
</div>
</div>

<div id="pdv" class="section">
<div class="card">
<b>Venda Presencial (PDV)</b>

<div id="pdvProdutos" class="grid"></div>

<div class="cart">
<h3>Carrinho</h3>
<div id="pdvCart"></div>
<b>Total: R$ <span id="pdvTotal">0</span></b><br><br>

<button class="primary" onclick="finalizarVenda()">Finalizar Venda</button>
</div>

</div>
</div>

<div id="cardapio" class="section">
<div class="card">
<b>Cardápio (mesmo do site)</b>
<div id="listaProdutos"></div>
</div>
</div>

<div id="clientes" class="section">
<div class="card">
<b>Clientes</b>
<div id="listaClientes"></div>
</div>
</div>

</div>
</div>

<audio id="somPedido">
<source src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg">
</audio>

<script type="module">

import { firebaseConfig } from "./firebase-config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let produtos=[]
let cart=[]
let pedidosCount=0

async function carregarProdutos(){

const snap = await getDocs(collection(db,'produtos'))

produtos = snap.docs.map(d=>({id:d.id,...d.data()}))

renderCardapio()
renderPDV()

}

function renderCardapio(){

document.getElementById("listaProdutos").innerHTML =
produtos.map(p=>`
<div class="prod">
<b>${p.nome}</b><br>
R$ ${p.preco}
</div>
`).join("")

}

function renderPDV(){

document.getElementById("pdvProdutos").innerHTML =
produtos.map(p=>`
<div class="prod" onclick="addPDV('${p.id}')">
${p.nome}<br>
R$ ${p.preco}
</div>
`).join("")

}

window.addPDV=function(id){

const p=produtos.find(x=>x.id==id)
cart.push(p)
renderCart()

}

function renderCart(){

let total=0

document.getElementById("pdvCart").innerHTML =
cart.map(i=>{
total+=Number(i.preco)
return `<div>${i.nome} - R$ ${i.preco}</div>`
}).join("")

document.getElementById("pdvTotal").innerText=total

}

window.finalizarVenda=function(){

if(!cart.length) return alert("Carrinho vazio")

alert("Venda finalizada")

cart=[]
renderCart()

}

function ouvirPedidos(){

const pedidosRef = collection(db,"pedidos")

onSnapshot(pedidosRef,(snap)=>{

const pedidos = snap.docs.map(d=>({id:d.id,...d.data()}))

if(pedidos.length>pedidosCount){
 document.getElementById("somPedido").play()
}

pedidosCount = pedidos.length

document.getElementById("listaPedidos").innerHTML =
pedidos.map(p=>`
<div class="prod">
<b>${p.cliente?.nome}</b><br>
Tel: ${p.cliente?.tel}<br>
Total: R$ ${p.total}<br><br>

<button class="good" onclick="window.open('https://wa.me/55${p.cliente?.tel}','_blank')">WhatsApp</button>
<button class="warn">Preparando</button>
<button class="primary">Saiu</button>
<button class="bad">Entregue</button>
</div>
`).join("")

})

}

carregarProdutos()
ouvirPedidos()

</script>

</body>
</html>
