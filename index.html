<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sabor da Sopa</title>
<style>
:root{
  --bg1:#ffcc00;
  --bg2:#e6b800;
  --card:rgba(0,0,0,.18);
  --line:rgba(255,255,255,.18);
  --txt:#fff;
  --muted:rgba(255,255,255,.78);
  --btn:#fff;
  --btnText:#b88600;
  --danger:#ffdddd;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--txt)}
header{position:sticky;top:0;z-index:20;background:rgba(0,0,0,.14);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.top{max-width:1180px;margin:auto;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:42px;height:42px;border-radius:14px;background:radial-gradient(circle at 30% 30%,#fff6bf,#fff 30%,#f5ca2f 62%,#ad7b00);box-shadow:0 10px 20px rgba(0,0,0,.20)}
.brand b{font-size:18px}
.small{font-size:12px;color:var(--muted);font-weight:800}
.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid var(--line);font-weight:900}
.wrap{max-width:1180px;margin:16px auto 110px;padding:0 14px;display:grid;grid-template-columns:1fr 380px;gap:14px}
@media(max-width:980px){.wrap{grid-template-columns:1fr;margin-bottom:120px}}
.panel,.cart{background:var(--card);border:1px solid var(--line);border-radius:20px;backdrop-filter:blur(7px);box-shadow:0 18px 40px rgba(0,0,0,.18)}
.hd{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.hd h2{margin:0;font-size:15px}
.catalogBody{padding:14px}
.searchBar{display:grid;grid-template-columns:1fr 200px;gap:10px;margin-bottom:14px}
@media(max-width:700px){.searchBar{grid-template-columns:1fr}}
.input,.select,.textarea{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.10);color:#fff;font-weight:900;outline:none}
.input::placeholder,.textarea::placeholder{color:rgba(255,255,255,.70)}
.sectionCat + .sectionCat{margin-top:18px}
.catTitle{font-size:14px;font-weight:1100;margin:0 0 10px;color:#fff7d1}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
.item{display:grid;grid-template-columns:92px 1fr;gap:12px;padding:12px;border:1px solid var(--line);border-radius:18px;background:rgba(0,0,0,.12)}
.item img{width:92px;height:92px;object-fit:cover;border-radius:14px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08)}
.noimg{width:92px;height:92px;border-radius:14px;border:1px solid rgba(255,255,255,.22);display:grid;place-items:center;background:rgba(255,255,255,.08);font-size:28px}
.itemInfo{min-width:0}
.itemName{font-size:16px;font-weight:1100;line-height:1.2}
.itemPrice{margin-top:4px;font-weight:1100;color:#fff7d1}
.extrasBox{margin-top:8px;display:grid;gap:6px}
.extraOpt{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;color:#fff}
.extraOpt input{transform:scale(1.05)}
.itemActions{margin-top:10px;display:flex;justify-content:flex-end}
.btn{border:none;border-radius:14px;padding:11px 14px;background:var(--btn);color:var(--btnText);font-weight:1100;cursor:pointer}
.btn:active{transform:translateY(1px)}
.cart{align-self:start;position:sticky;top:76px}
@media(max-width:980px){.cart{position:fixed;left:8px;right:8px;bottom:8px;top:auto;z-index:30;transform:translateY(calc(100% - 78px));transition:.22s ease;border-radius:20px}.cart.open{transform:translateY(0)}}
.cartBody{padding:14px;display:grid;gap:12px;max-height:calc(100vh - 120px);overflow:auto}
.customer{display:grid;gap:10px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.row{grid-template-columns:1fr}}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:9px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.09);font-weight:1000;cursor:pointer}
.chip.active{background:rgba(255,255,255,.22)}
.cartItems{display:grid;gap:10px}
.cartItem{padding:10px 12px;border:1px solid var(--line);background:rgba(0,0,0,.12);border-radius:16px}
.cartTop{display:flex;gap:10px;justify-content:space-between;align-items:flex-start}
.cartName{font-weight:1100}
.cartExtras{margin-top:6px;font-size:12px;color:#fff7d1;font-weight:900;display:grid;gap:2px}
.qtyLine{margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.qtyBox{display:flex;align-items:center;gap:8px}
.qtyBtn{width:32px;height:32px;border:none;border-radius:10px;background:#fff;color:#b88600;font-size:18px;font-weight:1100;cursor:pointer}
.sum{display:grid;gap:8px;padding-top:12px;border-top:1px dashed rgba(255,255,255,.32)}
.line{display:flex;justify-content:space-between;gap:10px;font-weight:1000}
.primary{padding:13px 14px;font-size:15px}
.empty{padding:12px;border:1px dashed rgba(255,255,255,.28);border-radius:16px;color:var(--muted);font-weight:800;text-align:center}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#102113;color:#fff;padding:11px 13px;border-radius:14px;border:1px solid rgba(255,255,255,.14);display:none;z-index:60}
.cartBar{display:none}
@media(max-width:980px){.cartBar{display:block;position:fixed;left:8px;right:8px;bottom:8px;z-index:40}.cartBar button{width:100%;border:none;border-radius:18px;padding:14px;background:#fff;color:#b88600;font-weight:1100;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:0 16px 36px rgba(0,0,0,.25)}.badge{min-width:28px;height:28px;border-radius:999px;background:rgba(184,134,0,.12);display:inline-flex;align-items:center;justify-content:center;padding:0 8px}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:25}
.overlay.show{display:block}
.rotateTop{display:none}
@media(max-width:980px) and (orientation:portrait){.rotateTop{display:block;position:fixed;top:0;left:0;right:0;padding:8px 10px;background:#664800;color:#fff;text-align:center;z-index:50;font-size:13px;font-weight:800}body{padding-top:36px}}
</style>
</head>
<body>
<div class="rotateTop">Dica: vire o celular para melhor ver o cardápio 🍲</div>
<header>
  <div class="top">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <b>Sabor da Sopa</b>
        <div class="small">Cardápio online • pedido no WhatsApp</div>
      </div>
    </div>
    <div class="pill" id="statusPill">🔄 carregando…</div>
  </div>
</header>

<div class="wrap">
  <section class="panel">
    <div class="hd">
      <h2>🍲 Cardápio</h2>
      <div class="small" id="catInfo">0 itens</div>
    </div>
    <div class="catalogBody">
      <div class="searchBar">
        <input id="busca" class="input" placeholder="Buscar sopa, caldo, canja...">
        <select id="filtroCat" class="select">
          <option value="">Todas as categorias</option>
        </select>
      </div>
      <div id="catalogo"></div>
    </div>
  </section>

  <aside class="cart" id="cartSheet">
    <div class="hd">
      <h2>🛒 Seu pedido</h2>
      <div class="small"><span id="qtd">0</span> itens</div>
    </div>
    <div class="cartBody">
      <div class="customer">
        <div class="small">Dados do cliente</div>
        <div class="row">
          <input id="cliNome" class="input" placeholder="Nome">
          <input id="cliTel" class="input" placeholder="WhatsApp com DDD" inputmode="tel">
        </div>
        <input id="cliEnd" class="input" placeholder="Endereço completo">
      </div>

      <div>
        <div class="small" style="margin-bottom:8px">Tipo do pedido</div>
        <div class="chips">
          <div class="chip active" id="chipEntrega" onclick="setEntrega('ENTREGA')">🏍️ Entrega</div>
          <div class="chip" id="chipRetirada" onclick="setEntrega('RETIRADA')">🏪 Retirada</div>
        </div>
      </div>

      <div class="row">
        <select id="pay" class="select">
          <option value="DINHEIRO">Dinheiro</option>
          <option value="PIX">PIX</option>
          <option value="CARTÃO">Cartão</option>
        </select>
        <input id="troco" class="input" placeholder="Troco para (se dinheiro)">
      </div>

      <textarea id="obs" class="textarea" placeholder="Observação do pedido (opcional)"></textarea>

      <div id="cartItems" class="cartItems"></div>

      <div class="sum">
        <div class="line"><span>Subtotal</span><b id="sub">R$ 0,00</b></div>
        <div class="line"><span>Total</span><b id="tot">R$ 0,00</b></div>
        <button class="btn primary" onclick="finalizar()">Finalizar e enviar no WhatsApp</button>
        <div class="small">O pedido é salvo online e abre a conversa no WhatsApp.</div>
      </div>
    </div>
  </aside>
</div>

<div class="overlay" id="cartOverlay" onclick="toggleCart(false)"></div>
<div class="cartBar" id="cartBar"><button onclick="toggleCart(true)"><span>🛒 Carrinho <span class="badge" id="barQtd">0</span></span><span id="barTot">R$ 0,00</span></button></div>
<div class="toast" id="toast"></div>

<script type="module">
import { firebaseConfig } from "./firebase-config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const catalogo = document.getElementById('catalogo');
const statusPill = document.getElementById('statusPill');
const catInfo = document.getElementById('catInfo');
const cartItemsEl = document.getElementById('cartItems');
const qtdEl = document.getElementById('qtd');
const subEl = document.getElementById('sub');
const totEl = document.getElementById('tot');
const buscaEl = document.getElementById('busca');
const filtroCatEl = document.getElementById('filtroCat');

let produtos = [];
let cart = [];
let entregaTipo = 'ENTREGA';

function moneyBR(v){ return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function slugExtras(extras){ return (extras||[]).map(x=>`${x.nome}:${x.preco}`).sort().join('|'); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(window.__tt);
  window.__tt = setTimeout(()=>t.style.display='none', 1800);
}
function maskTel(raw){
  const digits = String(raw||'').replace(/\D/g,'').slice(0,11);
  if(digits.length <= 2) return digits;
  const ddd = digits.slice(0,2), rest = digits.slice(2);
  if(rest.length <= 4) return `(${ddd}) ${rest}`;
  if(rest.length <= 8) return `(${ddd}) ${rest.slice(0,4)}-${rest.slice(4)}`;
  return `(${ddd}) ${rest.slice(0,5)}-${rest.slice(5)}`;
}
document.getElementById('cliTel').addEventListener('input', e => e.target.value = maskTel(e.target.value));

function setEntrega(tipo){
  entregaTipo = tipo === 'RETIRADA' ? 'RETIRADA' : 'ENTREGA';
  document.getElementById('chipEntrega').classList.toggle('active', entregaTipo === 'ENTREGA');
  document.getElementById('chipRetirada').classList.toggle('active', entregaTipo === 'RETIRADA');
}
window.setEntrega = setEntrega;

function getSelectedExtras(prodId){
  const cbs = Array.from(document.querySelectorAll(`input[data-extra-prod="${prodId}"]:checked`));
  return cbs.map(cb => ({ nome: cb.dataset.nome, preco: Number(cb.dataset.preco || 0) }));
}

function addToCart(prodId){
  const p = produtos.find(x => String(x.id) === String(prodId));
  if(!p) return;
  const extras = getSelectedExtras(prodId);
  const key = `${p.id}__${slugExtras(extras)}`;
  const found = cart.find(i => i.key === key);
  if(found){
    found.qtd += 1;
  }else{
    cart.push({
      key,
      id: p.id,
      nome: p.nome,
      preco: Number(p.preco || 0),
      qtd: 1,
      extras,
      fotoURL: p.fotoURL || ''
    });
  }
  recalc();
  renderCart();
  toast(`${p.nome} adicionado`);
  if(window.matchMedia('(max-width:980px)').matches) toggleCart(true);
}
window.addToCart = addToCart;

function incCart(key){
  const it = cart.find(x => x.key === key);
  if(!it) return;
  it.qtd += 1;
  recalc();
  renderCart();
}
function decCart(key){
  const it = cart.find(x => x.key === key);
  if(!it) return;
  it.qtd -= 1;
  if(it.qtd <= 0) cart = cart.filter(x => x.key !== key);
  recalc();
  renderCart();
}
window.incCart = incCart;
window.decCart = decCart;

function lineUnit(it){
  const extras = (it.extras||[]).reduce((s,e)=>s+Number(e.preco||0),0);
  return Number(it.preco||0) + extras;
}

function recalc(){
  const qtd = cart.reduce((s,i)=>s+Number(i.qtd||0),0);
  const subtotal = cart.reduce((s,i)=>s + (lineUnit(i) * Number(i.qtd||0)), 0);
  qtdEl.textContent = String(qtd);
  subEl.textContent = moneyBR(subtotal);
  totEl.textContent = moneyBR(subtotal);
  document.getElementById('barQtd').textContent = String(qtd);
  document.getElementById('barTot').textContent = moneyBR(subtotal);
}

function renderCart(){
  if(!cart.length){
    cartItemsEl.innerHTML = '<div class="empty">Seu carrinho está vazio.</div>';
    return;
  }
  cartItemsEl.innerHTML = cart.map(it => `
    <div class="cartItem">
      <div class="cartTop">
        <div>
          <div class="cartName">${it.nome}</div>
          <div class="small">${moneyBR(lineUnit(it))} cada</div>
        </div>
        <div style="font-weight:1100">${moneyBR(lineUnit(it) * it.qtd)}</div>
      </div>
      ${(it.extras||[]).length ? `<div class="cartExtras">${it.extras.map(e => `+ ${e.nome} (${moneyBR(e.preco)})`).join('<br>')}</div>` : ''}
      <div class="qtyLine">
        <div class="small">Quantidade</div>
        <div class="qtyBox">
          <button class="qtyBtn" onclick="decCart('${it.key.replace(/'/g, "&#39;")}')">-</button>
          <b>${it.qtd}</b>
          <button class="qtyBtn" onclick="incCart('${it.key.replace(/'/g, "&#39;")}')">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

function renderCatalog(){
  const q = (buscaEl.value || '').trim().toLowerCase();
  const fcat = (filtroCatEl.value || '').trim().toLowerCase();
  const ativos = produtos.filter(p => p.ativo !== false);
  const filtrados = ativos.filter(p => {
    const nome = String(p.nome || '').toLowerCase();
    const cat = String(p.cat || 'Sem categoria').toLowerCase();
    if(q && !(`${nome} ${cat}`).includes(q)) return false;
    if(fcat && cat !== fcat) return false;
    return true;
  });

  catInfo.textContent = `${filtrados.length} itens`;
  if(!filtrados.length){
    catalogo.innerHTML = '<div class="empty">Nenhum item encontrado.</div>';
    return;
  }

  const grupos = {};
  filtrados.forEach(p => {
    const cat = (p.cat || 'Sem categoria').trim();
    if(!grupos[cat]) grupos[cat] = [];
    grupos[cat].push(p);
  });

  catalogo.innerHTML = Object.entries(grupos).map(([cat, itens]) => `
    <section class="sectionCat">
      <h3 class="catTitle">${cat}</h3>
      <div class="grid">
        ${itens.map(p => {
          const extras = Array.isArray(p.grupos) ? (p.grupos.flatMap(g => g?.itens || [])) : [];
          return `
            <div class="item">
              ${p.fotoURL ? `<img src="${p.fotoURL}" alt="${(p.nome||'').replace(/"/g,'&quot;')}">` : `<div class="noimg">🍲</div>`}
              <div class="itemInfo">
                <div class="itemName">${p.nome || ''}</div>
                <div class="itemPrice">${moneyBR(p.preco || 0)}</div>
                ${extras.length ? `<div class="extrasBox">${extras.map((e,idx) => `
                  <label class="extraOpt">
                    <input type="checkbox" data-extra-prod="${p.id}" data-nome="${String(e.nome||'').replace(/"/g,'&quot;')}" data-preco="${Number(e.preco||0)}" id="ex_${p.id}_${idx}">
                    <span>${e.nome} (+${moneyBR(e.preco||0)})</span>
                  </label>
                `).join('')}</div>` : `<div class="small" style="margin-top:8px">Sem adicionais</div>`}
                <div class="itemActions"><button class="btn" onclick="addToCart(${p.id})">Adicionar</button></div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </section>
  `).join('');
}

function fillCategorias(){
  const cats = [...new Set(produtos.filter(p => p.ativo !== false).map(p => (p.cat || 'Sem categoria').trim()))].sort((a,b)=>a.localeCompare(b,'pt-BR'));
  filtroCatEl.innerHTML = '<option value="">Todas as categorias</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

buscaEl.addEventListener('input', renderCatalog);
filtroCatEl.addEventListener('change', renderCatalog);

function dadosCliente(){
  return {
    nome: document.getElementById('cliNome').value.trim(),
    tel: document.getElementById('cliTel').value.replace(/\D/g,'').trim(),
    endereco: document.getElementById('cliEnd').value.trim()
  };
}

async function finalizar(){
  if(!cart.length) return alert('Carrinho vazio.');
  const c = dadosCliente();
  if(!c.nome || !c.tel || (entregaTipo === 'ENTREGA' && !c.endereco)){
    return alert('Preencha nome, WhatsApp e endereço.');
  }

  const metodo = document.getElementById('pay').value;
  const troco = document.getElementById('troco').value.trim();
  const obs = document.getElementById('obs').value.trim();
  const subtotal = cart.reduce((s,i)=>s + (lineUnit(i) * i.qtd), 0);

  const itens = cart.map(i => ({
    id: i.id,
    nome: i.nome,
    preco: i.preco,
    qtd: i.qtd,
    extras: i.extras || [],
    totalLinha: lineUnit(i) * i.qtd
  }));

  const pedido = {
    cliente: c,
    entregaTipo,
    metodo,
    troco,
    obs,
    itens,
    subtotal,
    total: subtotal,
    criadoEm: serverTimestamp()
  };

  try{
    await addDoc(collection(db,'pedidos'), pedido);
  }catch(e){
    console.warn('Falha ao salvar pedido', e);
  }

  const linhas = [];
  linhas.push('*Sabor da Sopa* 🍲');
  linhas.push('');
  linhas.push(`*Cliente:* ${c.nome}`);
  linhas.push(`*WhatsApp:* ${c.tel}`);
  linhas.push(`*Tipo:* ${entregaTipo}`);
  if(entregaTipo === 'ENTREGA') linhas.push(`*Endereço:* ${c.endereco}`);
  if(obs) linhas.push(`*Observação:* ${obs}`);
  linhas.push('');
  linhas.push('*Pedido:*');
  itens.forEach(i => {
    linhas.push(`- ${i.nome} x${i.qtd} (${moneyBR(i.totalLinha)})`);
    (i.extras || []).forEach(ex => linhas.push(`  + ${ex.nome} (${moneyBR(ex.preco)})`));
  });
  linhas.push('');
  linhas.push(`*Pagamento:* ${metodo}`);
  if(metodo === 'DINHEIRO' && troco) linhas.push(`*Troco para:* ${troco}`);
  linhas.push(`*Total:* ${moneyBR(subtotal)}`);

  const msg = encodeURIComponent(linhas.join('\n'));
  window.open(`https://wa.me/55${c.tel}?text=${msg}`, '_blank');

  cart = [];
  document.getElementById('obs').value = '';
  document.getElementById('troco').value = '';
  recalc();
  renderCart();
  toggleCart(false);
  toast('Pedido enviado para o WhatsApp');
}
window.finalizar = finalizar;

function toggleCart(open){
  if(!window.matchMedia('(max-width:980px)').matches) return;
  document.getElementById('cartSheet').classList.toggle('open', !!open);
  document.getElementById('cartOverlay').classList.toggle('show', !!open);
}
window.toggleCart = toggleCart;

async function carregar(){
  try{
    statusPill.textContent = '🔄 carregando…';
    const snap = await getDocs(query(collection(db,'produtos'), orderBy('ord','asc')));
    produtos = snap.docs.map(d => ({ id: Number(d.id), ...d.data() })).filter(p => Number.isFinite(p.id));
    fillCategorias();
    renderCatalog();
    renderCart();
    recalc();
    statusPill.textContent = '✅ online';
  }catch(e){
    console.error(e);
    statusPill.textContent = '⚠️ erro';
    catalogo.innerHTML = '<div class="empty">Erro ao carregar o cardápio. Confira o Firebase.</div>';
  }
}

carregar();
</script>
</body>
</html>
